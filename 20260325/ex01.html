<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #score {
            background-color: rgb(200, 200, 200);
            border: none;
            border-bottom: 1px solid rgb(10, 10, 10);
        }
    </style>
</head>
<body>
    <h1>성적확인</h1>
    <!-- 90이상 100이하 A학점 -->
     <input type="text" name="" id="score" value="100">
     <button id="check">성적확인</button>
     <div id='print'>
        123123
     </div>
</body>
</html>
<script>
    // button에는 onclick 속성 있음
    // input에는 value 속성 있음
    // dic, h1~h5, span 에는 textContent 속성 있음
    document.getElementById('check').onclick = function() {
        const num = document.getElementById('score').value;
        console.log(num);
        if (num >= 90 && num <= 100) {
            document.getElementById('print').textContent='A학점';
            console.log('A학점');
        }
        else if (num >= 80 && num <= 89) {
            document.getElementById('print').textContent='B학점';
            console.log('B학점');
        }
        else if (num >= 70 && num <= 79) {
            document.getElementById('print').textContent='C학점';
            console.log('C학점');
        }
        else {
            document.getElementById('print').textContent='D학점';
            console.log('D학점');
        }
    }
</script>
