<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <!--
    선택자는
    id선택자 - 단일 ,
    태그(h1,input,div)선택자 - 복수 ,
    클래스(class)선택자
     -->
    <style> 
        input{
            font-size: 30px;
            width: 100%;
            background-color: aqua;
        }
        .mydiv{
            border: 1px solid black; /* 테두리 속성값 */
            padding: 10px; /* 테두리를 기준으로 안쪽여백 */
        }
        button{
            color : white;
            background-color: rgb(255,100,100);
            padding: 2rem;
            margin: 1rem;
            border: none;
            cursor: pointer;
            float:right;
        }
        button:hover {
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="mydiv">
        <label for="aa">id</label>
        <!-- name 백엔드 id는 css 에서 사용-->
        <input type="text" name="" id="aa">
    </div>
     <div>
        <label for="bb">password</label>
        <input type="password" name="" id="bbb">
    </div>
    <button>로그인</button>
</body>
</html>
