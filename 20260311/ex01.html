<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container" style="background-color: rgb(220,230,220);">
        <h1>컨테이너사용</h1>
        <p>컨테이너는 화면의 크기에 따라 넓이가 정해지며 가운데 정렬이 됩니다.</p>
    </div>
    <div>
        <table class="table">
            <tr class ="table-primary"><td>1번열</td><td>2번열</td></tr>
            <tr class ="table-success"><td>1번열</td><td>2번열</td></tr>
            <tr class ="table-secondary"><td>1번열</td><td>2번열</td></tr>
            <tr class ="table-dark"><td>1번열</td><td>2번열</td></tr>
            <!-- command + x = 한줄삭제
             tab = 들여쓰기
             shift + tab = 내어쓰기
             option + command + 화살표 키 = 뭐 여러줄 가능-->
        </table>
    </div>
    <!-- command + w = 크롬브라우저 창닫기
     command + shift + t = 닫은 창 다시열기 -->
    <h1>Hello, world!</h1>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
